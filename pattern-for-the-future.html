            <img class="top poster" src="photos/tiled copy.jpg" />
            <figcaption>My vision of the future speculates the fusion of the natural and the artificial. This pattern exhibits organic elements essential to our humanity – the heart and neurons – connected to electronic circuitry. The lotus flower, as a symbol of rebirth, also features this motif with circuits extending from its roots. While the butterfly wings surrounding the heart speak to this digital-biological fusion as a transformation, the circuits being exposed indicates a sense of vulnerability. The gridded shapes that resemble simplified versions of hearts juxtapose the central anatomical heart, and serve as a representation of how pixelation often signifies a loss of data (or in this case, a loss of humanity).
            <br><br>
                I designed the main structure of this pattern to be abstract, with elements floating in space to give it an incomprehensible, transcendent atmosphere. Symmetry serves as the basis for my visual language as I felt that it expresses a more artificial energy than asymmetry, yet simultaneously connects to symmetry found in nature. This parallels the dichotomy between technology and the natural world that my pattern illustrates.
            </figcaption>
