            <iframe class="top" src="https://embed.figma.com/proto/uuID1IFJ3C4wGmdCjyweaI/Mandevilla?node-id=1-2&p=f&viewport=451%2C-2%2C0.31&scaling=scale-down-width&content-scaling=fixed&starting-point-node-id=1%3A2&page-id=0%3A1&embed-host=share"></iframe>
            <figcaption>The typeface I chose to create a digital type specimen for is Mandevilla. I was originally drawn to this typeface due to its swirly letterforms and its customization capabilities. For my specimen, I wanted to play into Mandevilla’s versatile nature by spotlighting its playful and elegant duality. I chose a dichromatic color scheme – purple and green – that I felt evoked both whimsy and sophistication. I think this typeface has a sort of magical garden character, so I opted to use “gateway” as an example word in my specimen. I also discovered that Mandevilla works really well with experimental / expressive use, and constructed an iron gate and flowers using its letters and symbols. To demonstrate how this typeface can be applied to the real world, I created mockups of two of its potential uses: on a business sign and on a book cover.
            <br><br>
                I gave my specimen website interactivity by applying a hover effect to the display text of the title name that changes the individual letters to show its alternative options. I also applied some animations to various elements to show the typeface in dynamic scenarios. I animated Mandevilla’s “A” letter in its various styles to show how it appears in different weights. I also gave the flowers a spinning animation that I felt complimented their radial structure. Throughout the specimen, I used a simplistic, sans-serif typeface (Hei) for the descriptors that contrasts Mandevilla's semi-serif appearance.
            <br><br>
