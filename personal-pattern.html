            <figcaption>This pattern illustrates my personal interpretation of childhood nostalgia. Nostalgia informs a lot of who I am today as I am constantly trying to reconcile my current self to my younger self within. As I grow older, it’s important to me that I maintain a sense of childlike wonder and imagination.
            <br><br>
                To incorporate this idea, I chose to implement a whimsical, fairytale aesthetic that reminds me of how I viewed the world as a young girl. Through elements like swirls, stars, unicorns, fairies, flowers, and clovers, this pattern highlights the magic and innocence of being a kid in regards to both natural and fantastical worlds. My visual language is very dependent on different types of symmetry such as radial, mirror, and rotational, as symmetry is often found in patterns on childhood objects due to the calmness and harmony it evokes. The color palette features a combination of bright and pastel colors that, alongside the soft gradients, emphasizes this romanticized vision of youth and femininity. </figcaption>
